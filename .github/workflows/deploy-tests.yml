name: Post-Deploy Tests (Testing)

# Runs Playwright E2E and k6 load tests against testing.crosswithfriends.com
# after a deploy completes.
#
# Triggers:
#   1. Automatically on push to master (same event that triggers Render deploy)
#   2. Manual — click "Run workflow" in GitHub Actions
#
# The wait-for-deploy step polls the site until the new version is live,
# so tests run against the freshly deployed code.
#
# Required GitHub Secrets:
#   TESTING_DB_URL — Postgres connection string for the testing database
#                    (e.g. postgres://user:pass@host:5432/dbname?sslmode=require)

on:
  push:
    branches: [master]

  workflow_dispatch:

env:
  BASE_URL: https://testing.crosswithfriends.com

jobs:
  wait-for-deploy:
    name: Wait for deploy to be live
    runs-on: ubuntu-latest
    steps:
      - name: Poll health endpoint
        run: |
          echo "Waiting for $BASE_URL to be reachable..."
          for i in $(seq 1 60); do
            if curl -sf "$BASE_URL/api/puzzle_list?page=0&pageSize=1" > /dev/null 2>&1; then
              echo "Site is live"
              exit 0
            fi
            echo "Attempt $i — not ready yet"
            sleep 5
          done
          echo "Site did not become ready in time"
          exit 1

  seed-testing-db:
    name: Seed testing database
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Seed load test data
        env:
          DATABASE_URL: ${{ secrets.TESTING_DB_URL }}
        run: psql "$DATABASE_URL" -f loadtest/seed.sql

  playwright:
    name: Playwright E2E
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: pnpm test:e2e:chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  load-tests:
    name: k6 Load Tests (smoke)
    needs: seed-testing-db
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.56.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Run API read tests
        env:
          K6_PROFILE: smoke
          BASE_URL: ${{ env.BASE_URL }}
        run: k6 run loadtest/api-read.js --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)"

      - name: Run API auth tests
        env:
          K6_PROFILE: smoke
          BASE_URL: ${{ env.BASE_URL }}
        run: k6 run loadtest/api-auth.js --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)"

      - name: Run API write tests
        env:
          K6_PROFILE: smoke
          BASE_URL: ${{ env.BASE_URL }}
        run: k6 run loadtest/api-write.js --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)"

      - name: Run WebSocket tests
        env:
          K6_PROFILE: smoke
          BASE_URL: ${{ env.BASE_URL }}
        run: k6 run loadtest/websocket.js --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)"
